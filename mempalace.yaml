# MemPalace Configuration for Synapse Bridge
# ------------------------------------------

# THE BRAIN: Fast internal storage for ChromaDB (Prevents the "Starting" hang)
storage:
  palace_path: "/root/palace_data"

# THE SOURCE: Where your actual scripts and 3D logic live
project:
  root_dir: "/mnt/SynapseBridge"

# THE MINER: How the AI reads your environment
mining:
  auto_mine: true
  watch_paths: ["/mnt/SynapseBridge"]
  ignore_patterns: ["venv", "__pycache__", ".git", "node_modules"]

# MCP SERVER SETTINGS
mcp:
  port: 8081
  host: "127.0.0.1"

