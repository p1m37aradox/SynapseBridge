# MemPalace Configuration v3.0.0
storage:
  path: "/root/SynapseBridge_Root/palace/db"
  type: "chromadb"
  host: "localhost"
  port: 8000

mining:
  default_wing: "synapse_bridge"
  whitelist:
    - "/root/SynapseBridge_Root/bridge"
    - "/root/SynapseBridge_Root/core"

reporting:
  auto_wake: true
  output_format: "markdown"
